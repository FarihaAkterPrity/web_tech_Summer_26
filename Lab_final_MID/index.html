<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Appointment Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Healthy Life Medical Center</h2>
        <h3>Patient Appointment Registration</h3>
        
        <div id="success-message" class="success-box hidden">
            Appointment Registration Completed Successfully!
        </div>

        <form id="registrationForm" novalidate>
            <!-- First Name -->
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName">
                <span class="error-message" id="firstNameError"></span>
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName">
                <span class="error-message" id="lastNameError"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
                <span class="error-message" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
                <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Confirm Password (To validate "Matches") -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword">
                <span class="error-message" id="confirmPasswordError"></span>
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="Male"> Male</label>
                    <label><input type="radio" name="gender" value="Female"> Female</label>
                    <label><input type="radio" name="gender" value="Other"> Other</label>
                </div>
                <span class="error-message" id="genderError"></span>
            </div>

            <!-- Preferred Service -->
            <div class="form-group">
                <label>Preferred Service:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="services" value="Consultation"> Consultation</label>
                    <label><input type="checkbox" name="services" value="Checkup"> Regular Checkup</label>
                    <label><input type="checkbox" name="services" value="LabTest"> Lab Test</label>
                </div>
                <span class="error-message" id="servicesError"></span>
            </div>

            <!-- Doctor's Department -->
            <div class="form-group">
                <label for="department">Doctor's Department:</label>
                <select id="department" name="department">
                    <option value="">-- Select a Department --</option>
                    <option value="General Medicine">General Medicine</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Neurology">Neurology</option>
                </select>
                <span class="error-message" id="departmentError"></span>
            </div>

            <!-- Health Description -->
            <div class="form-group">
                <label for="description">Health Description:</label>
                <textarea id="description" name="description" rows="4"></textarea>
                <span class="error-message" id="descriptionError"></span>
            </div>

            <button type="submit" id="submitBtn">Register Appointment</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
